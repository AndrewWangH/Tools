<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 个人财务管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .login-body {
            padding: 40px 30px;
        }
        
        .tab-container {
            display: flex;
            margin-bottom: 30px;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: #fff;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .form-container {
            display: none;
        }
        
        .form-container.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s ease;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .form-group input::placeholder {
            color: #aaa;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            background: #fff0f0;
            color: #dc3545;
            border: 1px solid #ffcdd2;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #28a745;
            border: 1px solid #c8e6c9;
        }
        
        .message.show {
            display: block;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #e0e0e0;
            margin-top: 4px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease, background 0.3s ease;
            width: 0%;
        }
        
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #28a745; width: 100%; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>💰 财务管理</h1>
            <p>个人资产与消费账单管理系统</p>
        </div>
        
        <div class="login-body">
            <div class="tab-container">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <!-- 登录表单 -->
            <div id="login-form" class="form-container active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="submit-btn" id="login-btn">登录</button>
                </form>
            </div>
            
            <!-- 注册表单 -->
            <div id="register-form" class="form-container">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="register-username">用户名</label>
                        <input type="text" id="register-username" placeholder="至少3个字符" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="register-nickname">昵称（可选）</label>
                        <input type="text" id="register-nickname" placeholder="显示名称">
                    </div>
                    <div class="form-group">
                        <label for="register-password">密码</label>
                        <input type="password" id="register-password" placeholder="至少6个字符" required minlength="6" oninput="checkPasswordStrength(this.value)">
                        <div class="password-strength">
                            <span id="strength-text">密码强度</span>
                            <div class="strength-bar">
                                <div class="strength-fill" id="strength-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">确认密码</label>
                        <input type="password" id="register-password-confirm" placeholder="再次输入密码" required>
                    </div>
                    <button type="submit" class="submit-btn" id="register-btn">注册</button>
                </form>
            </div>
            
            <p class="footer-text">安全登录，数据加密存储</p>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        // 检查是否已登录
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                // 验证token是否有效
                fetch(`${API_BASE}/auth/profile`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        window.location.href = '/';
                    }
                })
                .catch(() => {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                });
            }
        });
        
        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const tab = btn.dataset.tab;
                document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
                document.getElementById(`${tab}-form`).classList.add('active');
                
                hideMessage();
            });
        });
        
        // 显示消息
        function showMessage(text, type = 'error') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} show`;
        }
        
        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }
        
        // 密码强度检测
        function checkPasswordStrength(password) {
            const fill = document.getElementById('strength-fill');
            const text = document.getElementById('strength-text');
            
            fill.className = 'strength-fill';
            
            if (password.length < 6) {
                text.textContent = '密码太短';
                fill.className = 'strength-fill';
            } else if (password.length < 8) {
                text.textContent = '弱';
                fill.className = 'strength-fill strength-weak';
            } else if (/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                text.textContent = '强';
                fill.className = 'strength-fill strength-strong';
            } else if (/^(?=.*[a-zA-Z])(?=.*\d)/.test(password)) {
                text.textContent = '中等';
                fill.className = 'strength-fill strength-medium';
            } else {
                text.textContent = '弱';
                fill.className = 'strength-fill strength-weak';
            }
        }
        
        // 登录处理
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            if (!username || !password) {
                showMessage('请输入用户名和密码');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>登录中...';
            hideMessage();
            
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data.code === 0) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    showMessage('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    showMessage(data.message || '登录失败');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '登录';
            }
        }
        
        // 注册处理
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('register-username').value.trim();
            const nickname = document.getElementById('register-nickname').value.trim();
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;
            const btn = document.getElementById('register-btn');
            
            if (!username || username.length < 3) {
                showMessage('用户名至少3个字符');
                return;
            }
            
            if (!password || password.length < 6) {
                showMessage('密码至少6个字符');
                return;
            }
            
            if (password !== passwordConfirm) {
                showMessage('两次输入的密码不一致');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>注册中...';
            hideMessage();
            
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, nickname })
                });
                
                const data = await res.json();
                
                if (data.code === 0) {
                    showMessage('注册成功，请登录', 'success');
                    // 切换到登录标签
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                        document.getElementById('login-username').value = username;
                        document.getElementById('login-password').focus();
                    }, 500);
                } else {
                    showMessage(data.message || '注册失败');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '注册';
            }
        }
    </script>
</body>
</html>
